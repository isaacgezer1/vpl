<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFO Sim: Análise de Investimentos</title>
  <meta name="description" content="Simulador educacional sobre VPL, TIR, TMA e Payback Descontado para disciplina de Finanças." />

  <!-- Tailwind CSS via CDN: adequado para protótipo educacional e GitHub Pages. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone para permitir JSX diretamente no HTML. -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons via UMD -->
  <script src="https://unpkg.com/lucide-react@0.468.0/dist/umd/lucide-react.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #f8fafc; }
    .animate-fade-in-up {
      animation: fadeInUp 0.45s ease-out both;
    }
    .animate-zoom-in {
      animation: zoomIn 0.28s ease-out both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <noscript>Este simulador precisa de JavaScript habilitado para funcionar.</noscript>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const {
      Briefcase,
      TrendingUp,
      DollarSign,
      Clock,
      CheckCircle2,
      XCircle,
      AlertTriangle,
      Play,
      RotateCcw,
      Trophy
    } = lucideReact;

    // --- DATA: SCENARIOS ---
    const scenarios = [
      {
        id: 1,
        title: "O Primeiro Desafio: TIR vs TMA",
        context: "Você acaba de assumir como CFO da InovaTech, uma vertente da Gezer Business Corporation. Logo no primeiro dia, o CEO apresenta um projeto de expansão com uma Taxa Interna de Retorno (TIR) projetada de 12% ao ano. Ele está empolgado porque a taxa é positiva. No entanto, você sabe que a Taxa Mínima de Atratividade (TMA), ou custo de capital da InovaTech, é de 15% ao ano.",
        question: "Qual deve ser a sua recomendação técnica?",
        options: [
          {
            text: "Aprovar o projeto. Como a TIR de 12% é positiva, o projeto trará lucros contábeis para a empresa.",
            isCorrect: false,
            feedback: "Incorreto. Embora a TIR seja positiva, ela é menor que a TMA (12% < 15%). Isso significa que o projeto rende menos do que custa para financiá-lo. Na prática, aceitar esse projeto destruiria valor para os acionistas."
          },
          {
            text: "Rejeitar o projeto. A TIR é menor que a TMA, o que indica que o projeto destruirá valor para os acionistas.",
            isCorrect: true,
            feedback: "Excelente! A regra decisória da TIR é: aceitar projetos em que a TIR seja maior que a TMA. Como 12% < 15%, o projeto não compensa o risco nem o custo do capital."
          }
        ]
      },
      {
        id: 2,
        title: "O Dilema do VPL Negativo",
        context: "O Diretor de Marketing entra na sua sala com o 'Projeto Ômega'. Ele diz: 'CFO, o VPL deste projeto deu -R$ 50.000, mas o Payback Simples é de apenas 1,5 ano! Vamos recuperar o dinheiro rapidamente! O mercado exige essa inovação.'",
        question: "Como você, focado na gestão de valor, deve responder?",
        options: [
          {
            text: "Rejeitar o projeto financeiramente. Um VPL negativo significa perda de riqueza, e o Payback rápido não reverte esse fato.",
            isCorrect: true,
            feedback: "Perfeito! O VPL é a métrica central da criação de valor. Se o VPL é negativo, o projeto não cobre a TMA e destrói valor. O Payback informa apenas o prazo de recuperação do investimento, mas não mede a riqueza gerada pelo projeto."
          },
          {
            text: "Aprovar o projeto. A liquidez é mais importante que a rentabilidade. Um Payback de 1,5 ano mitiga qualquer risco de VPL negativo.",
            isCorrect: false,
            feedback: "Cuidado! O Payback mede velocidade de recuperação, não criação de riqueza. Um VPL de -R$ 50.000 significa que, em valor presente, a empresa perderia riqueza, independentemente da rapidez com que o investimento inicial retorna."
          }
        ]
      },
      {
        id: 3,
        title: "O Tempo e o Dinheiro: Payback Descontado",
        context: "O Conselho de Administração está revisando os manuais financeiros. Um dos conselheiros pergunta por que a InovaTech deveria mudar a análise de 'Payback Simples' para 'Payback Descontado' nos próximos projetos de longo prazo.",
        question: "Qual é a melhor justificativa conceitual para essa mudança?",
        options: [
          {
            text: "O Payback Descontado é mais fácil de calcular e ajuda a prever a inflação futura com maior exatidão.",
            isCorrect: false,
            feedback: "Incorreto. O Payback Descontado, na verdade, é mais trabalhoso que o Payback Simples. Sua vantagem não é prever inflação, mas considerar o valor do dinheiro no tempo por meio da taxa de desconto."
          },
          {
            text: "O Payback Descontado considera o valor do dinheiro no tempo, descontando os fluxos pela TMA antes de somá-los, oferecendo uma visão mais realista do prazo de recuperação.",
            isCorrect: true,
            feedback: "Exatamente! O Payback Simples trata R$ 1.000 hoje como se fosse igual a R$ 1.000 daqui a alguns anos. O Payback Descontado corrige essa limitação ao trazer os fluxos futuros a valor presente pela TMA."
          }
        ]
      },
      {
        id: 4,
        title: "O Confronto de Titãs: VPL vs TIR",
        context: "Você tem um orçamento limitado e só pode escolher um projeto. Os projetos são mutuamente excludentes. A TMA é de 10% ao ano.\n\nProjeto Alpha: VPL = R$ 150.000 | TIR = 18%\nProjeto Beta: VPL = R$ 100.000 | TIR = 25%",
        question: "Qual projeto maximiza a riqueza da InovaTech?",
        options: [
          {
            text: "Projeto Alpha. Quando há conflito entre VPL e TIR em projetos excludentes, o VPL deve prevalecer, pois mede a riqueza absoluta gerada.",
            isCorrect: true,
            feedback: "Brilhante! Esse é um ponto clássico em análise de investimentos. O Projeto Beta tem maior taxa percentual, mas o Projeto Alpha gera maior riqueza absoluta. Em projetos mutuamente excludentes, o critério do maior VPL deve prevalecer."
          },
          {
            text: "Projeto Beta. A TIR de 25% é superior aos 18% do Alpha, garantindo uma margem de segurança maior para a empresa.",
            isCorrect: false,
            feedback: "Incorreto. Em projetos mutuamente excludentes, a TIR pode induzir erro por problemas de escala ou de distribuição temporal dos fluxos. O objetivo financeiro é maximizar a riqueza absoluta, e o Projeto Alpha gera R$ 50.000 a mais de VPL."
          }
        ]
      }
    ];

    function App() {
      const [gameState, setGameState] = useState('start');
      const [currentStep, setCurrentStep] = useState(0);
      const [score, setScore] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);

      const startGame = () => {
        setGameState('playing');
        setCurrentStep(0);
        setScore(0);
        setSelectedOption(null);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleOptionSelect = (option) => {
        setSelectedOption(option);
        setGameState('feedback');
        if (option.isCorrect) {
          setScore((previousScore) => previousScore + 25);
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const nextStep = () => {
        if (currentStep < scenarios.length - 1) {
          setCurrentStep((previousStep) => previousStep + 1);
          setGameState('playing');
          setSelectedOption(null);
        } else {
          setGameState('end');
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const currentScenario = scenarios[currentStep];
      const progressWidth = gameState === 'end' ? 100 : ((currentStep) / scenarios.length) * 100;

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans flex flex-col">
          <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-10">
            <div className="max-w-4xl mx-auto flex flex-col gap-3 sm:flex-row sm:justify-between sm:items-center">
              <div className="flex items-center space-x-2">
                <Briefcase className="w-6 h-6 text-emerald-400" aria-hidden="true" />
                <h1 className="font-bold text-lg sm:text-xl tracking-tight">CFO Sim: Capital Decisions</h1>
              </div>
              {gameState !== 'start' && (
                <div className="flex items-center">
                  <div className="text-sm font-medium bg-slate-800 px-3 py-1 rounded-full border border-slate-700 flex items-center">
                    <Trophy className="w-4 h-4 text-yellow-400 mr-2" aria-hidden="true" />
                    Reputação: {score}/100
                  </div>
                </div>
              )}
            </div>
          </header>

          <main className="w-full max-w-4xl mx-auto p-4 md:p-8 flex-1">
            {gameState === 'start' && (
              <section className="bg-white rounded-2xl shadow-xl p-8 md:p-12 text-center border border-slate-100 mt-6 md:mt-10 animate-fade-in-up" aria-labelledby="titulo-inicial">
                <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                  <TrendingUp className="w-10 h-10" aria-hidden="true" />
                </div>
                <h2 id="titulo-inicial" className="text-3xl md:text-4xl font-extrabold mb-4 text-slate-900">
                  Desafio CFO: Análise de Investimentos
                </h2>
                <p className="text-lg text-slate-600 mb-8 max-w-2xl mx-auto leading-relaxed">
                  Você acaba de ser contratado como Diretor Financeiro (CFO) da InovaTech, uma vertente da Gezer Business Corporation.
                  Sua missão é tomar decisões críticas de alocação de capital utilizando
                  <strong> VPL, TIR e Payback Descontado</strong>.
                </p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10 text-left max-w-3xl mx-auto">
                  <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col items-center text-center">
                    <DollarSign className="w-8 h-8 text-blue-500 mb-2" aria-hidden="true" />
                    <h3 className="font-bold text-sm">VPL</h3>
                    <p className="text-xs text-slate-500 mt-1">Valor Presente Líquido: mede a riqueza absoluta criada.</p>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col items-center text-center">
                    <TrendingUp className="w-8 h-8 text-purple-500 mb-2" aria-hidden="true" />
                    <h3 className="font-bold text-sm">TIR</h3>
                    <p className="text-xs text-slate-500 mt-1">Taxa Interna de Retorno: a taxa que zera o VPL.</p>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 flex flex-col items-center text-center">
                    <Clock className="w-8 h-8 text-orange-500 mb-2" aria-hidden="true" />
                    <h3 className="font-bold text-sm">Payback Desc.</h3>
                    <p className="text-xs text-slate-500 mt-1">Tempo de recuperação considerando o valor do dinheiro no tempo.</p>
                  </div>
                </div>
                <button
                  onClick={startGame}
                  className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-10 rounded-full text-lg transition-all transform hover:scale-105 shadow-lg inline-flex items-center mx-auto focus:outline-none focus:ring-4 focus:ring-emerald-300"
                >
                  <Play className="w-5 h-5 mr-2 fill-current" aria-hidden="true" />
                  Iniciar Simulação
                </button>
              </section>
            )}

            {gameState === 'playing' && (
              <section className="animate-fade-in-up" aria-labelledby="titulo-cenario">
                <div className="mb-6" aria-label="Progresso da simulação">
                  <div className="flex justify-between text-sm font-bold text-slate-500 mb-2">
                    <span>Decisão {currentStep + 1} de {scenarios.length}</span>
                    <span>Progresso</span>
                  </div>
                  <div className="w-full bg-slate-200 rounded-full h-2.5">
                    <div
                      className="bg-emerald-500 h-2.5 rounded-full transition-all duration-500"
                      style={{ width: `${progressWidth}%` }}
                    ></div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                  <div className="bg-slate-800 p-6 text-white">
                    <h2 id="titulo-cenario" className="text-2xl font-bold">{currentScenario.title}</h2>
                  </div>
                  <div className="p-6 md:p-8">
                    <div className="bg-slate-50 border-l-4 border-emerald-500 p-4 mb-8 rounded-r-lg whitespace-pre-line text-lg text-slate-700 leading-relaxed">
                      {currentScenario.context}
                    </div>

                    <h3 className="text-xl font-bold mb-6 flex items-center">
                      <AlertTriangle className="w-5 h-5 text-orange-500 mr-2 flex-shrink-0" aria-hidden="true" />
                      {currentScenario.question}
                    </h3>

                    <div className="space-y-4">
                      {currentScenario.options.map((option, index) => (
                        <button
                          key={index}
                          onClick={() => handleOptionSelect(option)}
                          className="w-full text-left p-5 rounded-xl border-2 border-slate-200 hover:border-emerald-500 hover:bg-emerald-50 transition-all group focus:outline-none focus:ring-4 focus:ring-emerald-200"
                        >
                          <div className="flex items-start">
                            <div className="flex-shrink-0 w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mr-4 group-hover:bg-emerald-200 group-hover:text-emerald-700 font-bold transition-colors">
                              {String.fromCharCode(65 + index)}
                            </div>
                            <span className="text-lg text-slate-700 group-hover:text-slate-900">{option.text}</span>
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </section>
            )}

            {gameState === 'feedback' && selectedOption && (
              <section className="animate-zoom-in" aria-labelledby="titulo-feedback">
                <div className={`rounded-2xl shadow-xl p-8 border-2 ${selectedOption.isCorrect ? 'bg-emerald-50 border-emerald-500' : 'bg-red-50 border-red-500'}`}>
                  <div className="flex flex-col sm:flex-row sm:items-center mb-6 gap-4">
                    {selectedOption.isCorrect ? (
                      <CheckCircle2 className="w-12 h-12 text-emerald-600 flex-shrink-0" aria-hidden="true" />
                    ) : (
                      <XCircle className="w-12 h-12 text-red-600 flex-shrink-0" aria-hidden="true" />
                    )}
                    <h2 id="titulo-feedback" className={`text-3xl font-bold ${selectedOption.isCorrect ? 'text-emerald-800' : 'text-red-800'}`}>
                      {selectedOption.isCorrect ? 'Decisão Brilhante, CFO!' : 'Atenção, CFO!'}
                    </h2>
                  </div>

                  <div className="bg-white p-6 rounded-xl shadow-sm mb-8 text-lg text-slate-700 leading-relaxed border border-slate-100">
                    {selectedOption.feedback}
                  </div>

                  <button
                    onClick={nextStep}
                    className={`w-full md:w-auto px-8 py-4 rounded-xl font-bold text-white text-lg transition-transform hover:scale-105 shadow-md inline-flex items-center justify-center focus:outline-none focus:ring-4 ${selectedOption.isCorrect ? 'bg-emerald-600 hover:bg-emerald-700 focus:ring-emerald-300' : 'bg-slate-800 hover:bg-slate-900 focus:ring-slate-300'}`}
                  >
                    {currentStep < scenarios.length - 1 ? 'Próxima Decisão' : 'Ver Relatório Final'}
                    <TrendingUp className="w-5 h-5 ml-2" aria-hidden="true" />
                  </button>
                </div>
              </section>
            )}

            {gameState === 'end' && (
              <section className="bg-white rounded-2xl shadow-xl p-8 md:p-12 text-center border border-slate-200 animate-fade-in-up" aria-labelledby="titulo-final">
                <Trophy className={`w-24 h-24 mx-auto mb-6 ${score === 100 ? 'text-yellow-400' : score >= 50 ? 'text-slate-400' : 'text-orange-800'}`} aria-hidden="true" />
                <h2 id="titulo-final" className="text-4xl font-extrabold mb-2 text-slate-900">Avaliação do Conselho</h2>
                <p className="text-xl text-slate-500 mb-8">Sua pontuação final: <span className="font-bold text-2xl text-emerald-600">{score}%</span></p>

                <div className="bg-slate-50 p-6 rounded-xl border border-slate-200 text-left mb-8 max-w-2xl mx-auto">
                  <h3 className="font-bold text-lg mb-4 text-slate-800 border-b pb-2">Resumo de Aprendizado:</h3>
                  <ul className="space-y-3 text-slate-600">
                    <li className="flex items-start">
                      <CheckCircle2 className="w-5 h-5 text-emerald-500 mr-2 flex-shrink-0 mt-0.5" aria-hidden="true" />
                      <span><strong>TIR vs TMA:</strong> um projeto só é viável se a TIR for superior à TMA.</span>
                    </li>
                    <li className="flex items-start">
                      <CheckCircle2 className="w-5 h-5 text-emerald-500 mr-2 flex-shrink-0 mt-0.5" aria-hidden="true" />
                      <span><strong>Soberania do VPL:</strong> o VPL mede a criação de riqueza absoluta. Se for negativo, o projeto destrói valor.</span>
                    </li>
                    <li className="flex items-start">
                      <CheckCircle2 className="w-5 h-5 text-emerald-500 mr-2 flex-shrink-0 mt-0.5" aria-hidden="true" />
                      <span><strong>Payback Descontado:</strong> é superior ao simples por considerar o valor do dinheiro no tempo.</span>
                    </li>
                    <li className="flex items-start">
                      <CheckCircle2 className="w-5 h-5 text-emerald-500 mr-2 flex-shrink-0 mt-0.5" aria-hidden="true" />
                      <span><strong>Projetos excludentes:</strong> quando houver conflito entre indicadores, escolha o projeto com o <strong>maior VPL</strong>.</span>
                    </li>
                  </ul>
                </div>

                <button
                  onClick={startGame}
                  className="bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-8 rounded-xl transition-all hover:shadow-lg inline-flex items-center justify-center mx-auto focus:outline-none focus:ring-4 focus:ring-slate-300"
                >
                  <RotateCcw className="w-5 h-5 mr-2" aria-hidden="true" />
                  Tentar Novamente
                </button>
              </section>
            )}
          </main>

          <footer className="bg-slate-900 text-slate-400 py-6 text-center text-sm mt-auto border-t border-slate-800">
            <div className="max-w-4xl mx-auto px-4">
              <p>Material desenvolvido pelo Professor Isaac Gezer para o ambiente de aprendizagem da disciplina de Finanças.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
